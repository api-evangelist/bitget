name: Bitget
description: Bitget is a cryptocurrency exchange and copy trading platform offering
  REST and WebSocket APIs for spot trading, futures (USDT-M, USDC-M, and Coin-M
  perpetual contracts), margin trading, copy trading, broker services, and earn
  products. Developers can access real-time market data, execute trades, manage
  accounts and sub-accounts, and integrate copy trading leader and follower
  workflows.
image: https://kinlane-productions2.s3.amazonaws.com/apis-json/apis-json-logo.jpg
url: https://raw.githubusercontent.com/api-evangelist/bitget/refs/heads/main/apis.yml
version: "0.19"
created: "2026-06-13"
modified: "2026-06-13"
specificationVersion: "0.19"

tags:
